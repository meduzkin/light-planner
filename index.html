<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Light Spot Planner — 2D/3D</title>
<style>
  :root{--bg:#0f1115;--panel:#1a1d24;--panel2:#23262f;--line:#2f3441;--txt:#d7dce5;--muted:#8a93a6;--accent:#ffcf6b;--accent2:#62a0ff;--green:#7fd08a;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);font:13px/1.4 -apple-system,Segoe UI,Roboto,sans-serif;overflow:hidden}
  #app{display:flex;height:100%}
  #side{width:330px;min-width:330px;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column}
  #side h1{font-size:14px;margin:0;padding:11px 14px;border-bottom:1px solid var(--line)}
  #side h1 small{color:var(--muted);font-weight:400;font-size:11px}
  .scroll{overflow:auto;flex:1;padding:12px 14px}
  .grp{margin-bottom:15px}
  .grp>label{display:block;color:var(--muted);text-transform:uppercase;font-size:10px;letter-spacing:.6px;margin-bottom:7px}
  .row{display:flex;gap:8px;align-items:center;margin-bottom:7px}
  .row label{flex:1;color:var(--muted)}
  .row input[type=number],.row input[type=text],.row select{width:96px;background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:5px;padding:5px 7px}
  .row input[type=range]{flex:1.4}
  .row .val{width:46px;text-align:right;color:var(--accent);font-variant-numeric:tabular-nums}
  button{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:6px;padding:7px 9px;cursor:pointer;font-size:12px}
  button:hover{border-color:var(--accent2)}
  button.primary{background:var(--accent2);border-color:var(--accent2);color:#0b1220;font-weight:600}
  button.on{background:var(--accent);border-color:var(--accent);color:#0b1220;font-weight:600}
  button.obj{background:#2c3a2c;border-color:#3c5a3c}
  button.danger:hover{border-color:#ff6b6b;color:#ff6b6b}
  .btnrow{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:7px}
  .btnrow>button{flex:1}
  label.chk{display:flex;align-items:center;gap:8px;color:var(--txt);margin-bottom:7px;cursor:pointer}
  .cards{display:flex;flex-direction:column;gap:5px}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:7px 9px;cursor:pointer}
  .card.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
  .card .top{display:flex;align-items:center;gap:8px}
  .swatch{width:13px;height:13px;border-radius:50%;border:1px solid #0006}
  .swatch.sq{border-radius:3px}
  .card .name{flex:1;font-weight:600}
  .card .meta{color:var(--muted);font-size:11px;margin-top:2px}
  .card .x{color:var(--muted);font-size:15px;padding:0 2px}
  .card .x:hover{color:#ff6b6b}
  .layerhead{background:#20242d}
  .litem{display:flex;align-items:center;gap:7px;margin-left:14px;padding:5px 8px;border:1px solid transparent;border-left:2px solid var(--line);border-radius:0 6px 6px 0;cursor:pointer;background:#191c23}
  .litem:hover{background:#1f242c}
  .litem.sel{border-color:var(--accent);border-left-color:var(--accent);background:#262017}
  .litem .ic{width:16px;text-align:center;opacity:.85}
  .litem .nm{flex:1}
  .litem .x{color:var(--muted);font-size:14px;padding:0 2px}
  .litem .x:hover{color:#ff6b6b}
  .hr{height:1px;background:var(--line);margin:13px 0}
  .mini{color:var(--muted);font-size:11px;margin-top:4px}
  #stage{flex:1;position:relative}
  #cv,#cv2d{display:block;position:absolute;inset:0;width:100%;height:100%}
  #modesw{position:absolute;left:50%;top:12px;transform:translateX(-50%);display:flex;background:#0009;border:1px solid var(--line);border-radius:8px;overflow:hidden;z-index:5}
  #modesw button{border:none;border-radius:0;background:transparent;padding:7px 16px}
  #modesw button.sel{background:var(--accent2);color:#0b1220;font-weight:600}
  #hint{position:absolute;left:12px;bottom:12px;background:#0009;border:1px solid var(--line);border-radius:7px;padding:8px 11px;color:var(--muted);font-size:11px;pointer-events:none;max-width:62%}
  #err{position:absolute;left:12px;top:12px;background:#3a1d1d;border:1px solid #6b3a3a;border-radius:7px;padding:8px 11px;color:#ffb4b4;font-size:12px;display:none;max-width:55%}
  .color{width:96px;height:28px;padding:2px;background:var(--panel2);border:1px solid var(--line);border-radius:5px}
  #gizmosw{position:absolute;right:12px;top:12px;display:flex;background:#0009;border:1px solid var(--line);border-radius:8px;overflow:hidden;z-index:5}
  #gizmosw button{border:none;border-radius:0;background:transparent;padding:6px 11px}
  #gizmosw button.sel{background:var(--accent2);color:#0b1220;font-weight:600}
  #popup{position:absolute;left:14px;top:52px;width:300px;max-height:calc(100% - 90px);background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:0 10px 34px #000b;z-index:8;display:none;flex-direction:column}
  #popup.show{display:flex}
  #popup .phead{display:flex;align-items:center;gap:8px;padding:8px 11px;border-bottom:1px solid var(--line);cursor:move;user-select:none}
  #popup .phead .pt{flex:1;font-weight:600;font-size:12px}
  #popup .phead .pc{cursor:pointer;color:var(--muted);font-size:17px;line-height:1;padding:0 3px}
  #popup .phead .pc:hover{color:#ff6b6b}
  #popup .pbody{overflow:auto;padding:11px 13px}
  .toggle{margin:0 0 9px}
  .toggle button{width:100%;text-align:left}
</style>
</head>
<body>
<div id="app">
  <aside id="side">
    <h1>Light Spot Planner <small data-i18n="subtitle">· 2D/3D</small><button id="lang" style="float:right;padding:3px 8px;font-size:11px">EN</button></h1>
    <div class="scroll">
      <div class="grp">
        <label data-i18n="grp_add">Добавить</label>
        <div class="btnrow">
          <button id="drawWall" data-i18n="btn_draw">✏ Рисовать стены</button>
          <button class="obj" id="addObj" data-i18n="btn_obj">+ Объект</button>
        </div>
        <div class="btnrow">
          <button id="addWin" data-i18n="btn_win">+ Окно</button>
          <button id="addDoor" data-i18n="btn_door">+ Дверь</button>
        </div>
        <div class="btnrow">
          <button class="primary" id="addLight" data-i18n="btn_light">+ Светильник</button>
          <button id="addTrack" data-i18n="btn_track">+ Шина</button>
        </div>
      </div>

      <div class="grp">
        <label data-i18n="grp_file">Файл</label>
        <div class="btnrow">
          <button id="load" data-i18n="btn_load">Загрузить</button>
          <button id="save" data-i18n="btn_save">Сохранить</button>
        </div>
        <div class="btnrow">
          <button id="export" data-i18n="btn_export">Экспорт</button>
          <button id="import" data-i18n="btn_import">Импорт</button>
        </div>
        <div class="btnrow">
          <button id="demo" data-i18n="btn_demo">Загрузить пример</button>
          <button id="fit" data-i18n="btn_fit">По размеру</button>
        </div>
        <div class="btnrow"><button id="reset" class="danger" data-i18n="btn_reset">Сбросить всё</button></div>
        <input id="importFile" type="file" accept="application/json,.json" style="display:none">
      </div>

      <div class="grp" id="layersGrp">
        <label id="layersToggle" style="display:flex;align-items:center;cursor:pointer"><span data-i18n="grp_layers">Слои</span><span id="layersChevron" style="margin-left:auto;font-size:11px">▾</span></label>
        <div id="layersWrap">
          <div class="cards" id="c_layers"></div>
          <div class="btnrow" style="margin-top:6px"><button id="addLayer" data-i18n="btn_layer">+ Слой</button></div>
        </div>
      </div>

      <div class="grp">
        <label data-i18n="grp_params">Параметры</label>
        <div class="row"><label data-i18n="lbl_ceil">Потолок, м</label><input id="rc" type="number" step="0.1"></div>
        <div class="row"><label data-i18n="lbl_grid">Сетка, м</label><input id="rg" type="number" step="0.1"></div>
      </div>

      <div class="grp">
        <label data-i18n="grp_sun">Солнце / дневной свет (3D)</label>
        <label class="chk"><input type="checkbox" id="d_on" checked> <span data-i18n="sun_on">Включить</span></label>
        <div class="row"><label data-i18n="sun_bright">Яркость</label><input id="d_sun" type="range" min="0" max="8" step="0.1" value="3.2"><span class="val" id="d_sun_v">3.2</span></div>
        <div class="row"><label data-i18n="sun_soft">Мягкость</label><input id="d_soft" type="range" min="1" max="20" step="1" value="7"><span class="val" id="d_soft_v">7</span></div>
        <div class="row"><label data-i18n="sun_winlight">Подсветка окон</label><input id="d_win" type="range" min="0" max="12" step="0.5" value="4"><span class="val" id="d_win_v">4</span></div>
        <div class="row"><label data-i18n="sun_sky">Свет неба</label><input id="d_sky" type="range" min="0" max="1.5" step="0.05" value="0.45"><span class="val" id="d_sky_v">.45</span></div>
        <div class="row"><label data-i18n="sun_colorlbl">Цвет</label><input id="d_color" type="color" class="color" value="#fff3df"></div>
      </div>

      <div class="grp">
        <label data-i18n="grp_lt">Светильники: свет/тени (3D)</label>
        <div class="row"><label data-i18n="q_label">Детализация</label>
          <select id="quality"><option value="low" data-i18n="q_low">Схематично</option><option value="med" data-i18n="q_med" selected>Средне</option><option value="high" data-i18n="q_high">Реалистично</option></select></div>
        <div class="row"><label data-i18n="lt_bright">Яркость</label><input id="intensity" type="range" min="0" max="40" step="0.5" value="10"><span class="val" id="intensity_v">10</span></div>
        <div class="row"><label data-i18n="lt_fill">Заполняющий</label><input id="ambient" type="range" min="0" max="1.5" step="0.05" value="0.18"><span class="val" id="ambient_v">.18</span></div>
        <div class="row"><label data-i18n="lt_shadowsoft">Мягкость теней</label><input id="soft" type="range" min="1" max="12" step="1" value="4"><span class="val" id="soft_v">4</span></div>
        <label class="chk"><input type="checkbox" id="t_ceiling"> <span data-i18n="t_ceiling">Видимый потолок</span></label>
        <label class="chk"><input type="checkbox" id="t_helpers"> <span data-i18n="t_helpers">Конусы лучей</span></label>
      </div>
      <div class="grp"><div class="mini" id="info"></div></div>
    </div>
  </aside>
  <main id="stage">
    <canvas id="cv2d"></canvas>
    <canvas id="cv"></canvas>
    <div id="modesw"><button id="m2d" class="sel" data-i18n="m2d">2D план</button><button id="m3d" data-i18n="m3d">3D вид</button></div>
    <div id="gizmosw" style="display:none"><button id="g_move" class="sel" data-i18n="g_move">Перемещение</button><button id="g_off" data-i18n="g_off">Обзор</button></div>
    <div id="hint"></div>
    <div id="err"></div>
    <div id="popup"><div class="phead"><span class="pt" id="popupTitle">Свойства</span><span class="pc" id="popupClose">×</span></div><div class="pbody"><div id="editor" class="grp"></div></div></div>
  </main>
</div>

const getTrack=id=>S.tracks.find(t=>t.id===id);
const getWall=id=>S.walls.find(w=>w.id===id);
const allEntities=()=>[...S.walls,...S.windows,...S.tracks,...S.lights,...S.objs];
function normalizeLayers(){
  if(!S.layers||!S.layers.length)S.layers=[{id:90,name:'Слой 1',visible:true}];
  if(S.activeLayer==null||!S.layers.find(l=>l.id===S.activeLayer))S.activeLayer=S.layers[0].id;
  const def=S.layers[0].id;
  for(const e of allEntities())if(e.layer==null||!S.layers.find(l=>l.id===e.layer))e.layer=def;
}
// держим маркер солнца близко к плану (сохраняя направление), иначе до него не дотянуться
function normalizeSun(){if(!S.sun)return;const bb=bbox();let dx=S.sun.x-bb.cx,dy=S.sun.y-bb.cy,d=Math.hypot(dx,dy);if(d<0.01){dx=0;dy=-1;d=1;}const want=Math.max(2,bb.size*0.45);if(d>want){S.sun.x=round(bb.cx+dx/d*want);S.sun.y=round(bb.cy+dy/d*want);}
  // держим высоту в кадре — иначе маркер уезжает за верх вьюпорта и его не схватить
  S.sun.height=round(clamp(S.sun.height||6,1.5,Math.max(3,bb.size*0.6)));}
function layerOf(e){return S.layers.find(l=>l.id===e.layer);}
function vis(e){const l=layerOf(e);return !l||l.visible;}
const findModel=(k,id)=> k==='light'?S.lights.find(x=>x.id===id):k==='track'?getTrack(id):k==='win'?S.windows.find(x=>x.id===id):k==='wall'?getWall(id):k==='sun'?S.sun:S.objs.find(x=>x.id===id);
function lightBase(L){
  if(L.shape==='sconce'&&L.wallId!=null){const w=getWall(L.wallId);if(w){const len=wallLen(w)||1,ux=(w.x2-w.x1)/len,uy=(w.y2-w.y1)/len,pos=clamp(L.pos||0,0,len);return[w.x1+ux*pos,w.y1+uy*pos];}}
  if(L.trackId!=null){const t=getTrack(L.trackId);if(t){const a=t.rot*D2R,u=clamp(L.u||0,-t.len/2,t.len/2);return [t.x+Math.cos(a)*u,t.y+Math.sin(a)*u];}}return[L.x,L.y];}
// нормаль стены в комнату (для бра)
function sconceNormal(L){const w=getWall(L.wallId);if(!w)return[0,-1];const len=wallLen(w)||1,ux=(w.x2-w.x1)/len,uy=(w.y2-w.y1)/len;let nx=-uy,ny=ux;const bb=bbox(),[px,py]=lightBase(L);if(((bb.cx-px)*nx+(bb.cy-py)*ny)<0){nx=-nx;ny=-ny;}return[nx,ny];}
const lightMH=L=>{if(L.trackId!=null){const t=getTrack(L.trackId);if(t)return t.mh;}return L.mh;};
const wallLen=w=>Math.hypot(w.x2-w.x1,w.y2-w.y1);
function trackOffsets(len,dmode,n,pitchMM){if(dmode==='pitch'){const p=Math.max(0.001,(pitchMM||0)/1000),k=Math.max(0,Math.floor(len/p+1e-9)),span=k*p,o=[];for(let i=0;i<=k;i++)o.push(-span/2+i*p);return o;}const c=Math.max(1,n|0),o=[];if(c===1)return[0];for(let i=0;i<c;i++)o.push((i/(c-1)-0.5)*len);return o;}
function emitterOffsets3D(L){
  if(L.shape==='chandelier'){const n=Math.max(1,L.bulbs|0),R=L.radius||0.4,o=[];if(n===1)return[[0,0]];for(let i=0;i<n;i++){const a=i/n*TAU;o.push([Math.cos(a)*R,Math.sin(a)*R]);}return o;}
  if(L.shape==='line'){const a=L.rot*D2R,offs=trackOffsets(L.len,L.dmode,L.n,L.pitch),st=Math.max(1,Math.ceil(offs.length/8)),o=[];for(let i=0;i<offs.length;i+=st)o.push([Math.cos(a)*offs[i],Math.sin(a)*offs[i]]);return o;}
  if(L.shape==='rect'){const a=L.rot*D2R,ca=Math.cos(a),sa=Math.sin(a),nx=Math.min(3,Math.max(2,L.n|0)),ny=Math.min(3,Math.max(2,L.n2|0)),o=[];for(let i=0;i<nx;i++)for(let j=0;j<ny;j++){const u=(i/(nx-1)-0.5)*L.len,v=(j/(ny-1)-0.5)*L.wid;o.push([u*ca-v*sa,u*sa+v*ca]);}return o;}
  return [[0,0]];
}
function emittersPlan(L){const[cx,cy]=lightCenter(L);return emitterOffsets3D(L).map(([ox,oy])=>[cx+ox,cy+oy]);}
const lightCenter=L=>lightBase(L);   // учитывает шину И стену (бра)
function bbox(){if(!S.walls.length)return{minx:0,miny:0,maxx:8,maxy:6,cx:4,cy:3,size:8};let a=Infinity,b=Infinity,c=-Infinity,d=-Infinity;for(const w of S.walls){a=Math.min(a,w.x1,w.x2);b=Math.min(b,w.y1,w.y2);c=Math.max(c,w.x1,w.x2);d=Math.max(d,w.y1,w.y2);}return{minx:a,miny:b,maxx:c,maxy:d,cx:(a+c)/2,cy:(b+d)/2,size:Math.max(c-a,d-b)||8};}
function projOnWall(w,px,py){const dx=w.x2-w.x1,dy=w.y2-w.y1,L=Math.hypot(dx,dy)||1;let t=clamp(((px-w.x1)*dx+(py-w.y1)*dy)/(L*L),0,1);const cx=w.x1+dx*t,cy=w.y1+dy*t;return{pos:t*L,len:L,cx,cy,dist:Math.hypot(px-cx,py-cy)};}
function nearestWall(px,py){let best=null;for(const w of S.walls){const r=projOnWall(w,px,py);if(!best||r.dist<best.dist)best={w,...r};}return best;}

/* ================= 2D ENGINE ================= */
const cv2=$('#cv2d'), g2=cv2.getContext('2d');
const view={scale:48,panx:-1,pany:-1};
const w2s=(x,y)=>[(x-view.panx)*view.scale,(y-view.pany)*view.scale];
const s2w=(sx,sy)=>[sx/view.scale+view.panx,sy/view.scale+view.pany];
function resize2d(){const r=$('#stage').getBoundingClientRect(),dpr=window.devicePixelRatio||1;cv2.width=r.width*dpr;cv2.height=r.height*dpr;g2.setTransform(dpr,0,0,dpr,0,0);}
function hexrgb(h){h=h.replace('#','');return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}

function draw2d(){
  const W=cv2.clientWidth,H=cv2.clientHeight;
  g2.setTransform(window.devicePixelRatio||1,0,0,window.devicePixelRatio||1,0,0);
  g2.clearRect(0,0,W,H);g2.fillStyle='#13151a';g2.fillRect(0,0,W,H);
  drawGrid2d();
  for(const L of S.lights) if(vis(L)) drawLightFoot2d(L);
  for(const o of S.objs) if(vis(o)) drawObj2d(o);
  for(const w of S.walls) if(vis(w)) drawWall2d(w);
  for(const t of S.tracks) if(vis(t)) drawTrack2d(t);
  for(const L of S.lights) if(vis(L)) drawLightMark2d(L);
  // sun
  drawSun2d();
  // draw-mode preview
  if(drawMode){
    if(drawCur){const[cx,cy]=w2s(drawCur.x,drawCur.y);
      if(drawPrev){const[px,py]=w2s(drawPrev.x,drawPrev.y);g2.strokeStyle='#7fd08a';g2.setLineDash([7,5]);g2.lineWidth=2;g2.beginPath();g2.moveTo(px,py);g2.lineTo(cx,cy);g2.stroke();g2.setLineDash([]);
        const len=Math.hypot(drawCur.x-drawPrev.x,drawCur.y-drawPrev.y);g2.fillStyle='#bff0c8';g2.font='12px sans-serif';g2.fillText(len.toFixed(2)+' м',(px+cx)/2+8,(py+cy)/2-6);}
      g2.fillStyle=drawCur.node?'#ffcf6b':'#7fd08a';g2.beginPath();g2.arc(cx,cy,5,0,TAU);g2.fill();g2.strokeStyle='#0008';g2.lineWidth=1;g2.stroke();
      g2.fillStyle='#9fe0aa';g2.font='10px sans-serif';g2.fillText(drawCur.x.toFixed(2)+', '+drawCur.y.toFixed(2),cx+10,cy+4);}
    if(drawPrev){const[px,py]=w2s(drawPrev.x,drawPrev.y);g2.fillStyle='#bff0c8';g2.beginPath();g2.arc(px,py,4,0,TAU);g2.fill();}
  }
}
function getCss(v){return getComputedStyle(document.documentElement).getPropertyValue(v)||'#7fd08a';}
function drawGrid2d(){
  const gr=S.room.grid||0.5,[x0,y0]=s2w(0,0),[x1,y1]=s2w(cv2.clientWidth,cv2.clientHeight);
  g2.lineWidth=1;g2.strokeStyle='#1e232c';g2.beginPath();
  for(let x=Math.floor(x0/gr)*gr;x<=x1;x+=gr){const[sx]=w2s(x,0);g2.moveTo(sx,0);g2.lineTo(sx,cv2.clientHeight);}
  for(let y=Math.floor(y0/gr)*gr;y<=y1;y+=gr){const[,sy]=w2s(0,y);g2.moveTo(0,sy);g2.lineTo(cv2.clientWidth,sy);}
  g2.stroke();
  g2.strokeStyle='#2a313c';g2.beginPath();
  for(let x=Math.ceil(x0);x<=x1;x++){const[sx]=w2s(x,0);g2.moveTo(sx,0);g2.lineTo(sx,cv2.clientHeight);}
  for(let y=Math.ceil(y0);y<=y1;y++){const[,sy]=w2s(0,y);g2.moveTo(0,sy);g2.lineTo(cv2.clientWidth,sy);}
  g2.stroke();
}
function drawLightFoot2d(L){
  if(L.on===false)return;   // выключен — пятно не рисуем
  if(L.shape==='sconce'){ // бра — сектор от стены в комнату
    if(L.wallId==null)return;const[bx,by]=lightBase(L),[nx,ny]=sconceNormal(L),ang=Math.atan2(ny,nx);const[sx,sy]=w2s(bx,by);const[r,gg,b]=hexrgb(L.color);
    const c=Math.max(0.12,Math.cos((L.tilt||0)*D2R));   // наклон вниз уменьшает горизонтальный вылет (как в 3D)
    const hf=(Math.max(L.beam,L.field)/2)*D2R,hb=(L.beam/2)*D2R;
    g2.fillStyle=`rgba(${r},${gg},${b},0.10)`;g2.beginPath();g2.moveTo(sx,sy);g2.arc(sx,sy,2.6*c*view.scale,ang-hf,ang+hf);g2.closePath();g2.fill();
    g2.fillStyle=`rgba(${r},${gg},${b},0.20)`;g2.beginPath();g2.moveTo(sx,sy);g2.arc(sx,sy,2.0*c*view.scale,ang-hb,ang+hb);g2.closePath();g2.fill();
    return;
  }
  if(L.dir==='up')return;   // uplight — на пол не светит
  const[cx,cy]=lightCenter(L),mh=lightMH(L);if(mh<=0)return;const[r,gg,b]=hexrgb(L.color);
  for(const [ex,ey] of emittersPlan(L)){
    const rf=mh*Math.tan((Math.max(L.beam,L.field)/2)*D2R),rb=mh*Math.tan((L.beam/2)*D2R);
    const[sx,sy]=w2s(ex,ey);
    g2.fillStyle=`rgba(${r},${gg},${b},0.10)`;g2.beginPath();g2.arc(sx,sy,rf*view.scale,0,TAU);g2.fill();
    g2.fillStyle=`rgba(${r},${gg},${b},0.20)`;g2.beginPath();g2.arc(sx,sy,rb*view.scale,0,TAU);g2.fill();
  }
}
function drawObj2d(o){
  const isSel=selIs('obj',o.id);const[scx,scy]=w2s(o.x+o.w/2,o.y+o.d/2);const W=o.w*view.scale,Hh=o.d*view.scale;
  g2.save();g2.translate(scx,scy);g2.rotate((o.rot||0)*D2R);
  g2.fillStyle='#2a2f38';g2.fillRect(-W/2,-Hh/2,W,Hh);
  g2.strokeStyle=isSel?'#fff':o.color;g2.lineWidth=isSel?2:1.4;g2.strokeRect(-W/2,-Hh/2,W,Hh);
  g2.fillStyle=isSel?'#fff':'#aeb7c6';g2.font='11px sans-serif';
  g2.fillText((o.base||0)>0?`${o.name} h${o.h}↑${o.base}`:`${o.name} h${o.h}`,-W/2+4,-Hh/2+13);
  g2.restore();
}
function drawWall2d(w){
  const isSel=selIs('wall',w.id);const[ax,ay]=w2s(w.x1,w.y1),[bx,by]=w2s(w.x2,w.y2);
  g2.strokeStyle=isSel?'#fff':'#7e8aa0';g2.lineWidth=isSel?7:6;g2.lineCap='round';
  g2.beginPath();g2.moveTo(ax,ay);g2.lineTo(bx,by);g2.stroke();
  // windows/doors as colored segments over wall
  const len=wallLen(w)||1,ux=(w.x2-w.x1)/len,uy=(w.y2-w.y1)/len;
  for(const win of S.windows.filter(x=>x.wallId===w.id)){
    const p0=clamp(win.pos-win.width/2,0,len),p1=clamp(win.pos+win.width/2,0,len);
    const[wx,wy]=w2s(w.x1+ux*p0,w.y1+uy*p0),[vx,vy]=w2s(w.x1+ux*p1,w.y1+uy*p1);
    g2.strokeStyle=win.kind==='door'?'#7fd08a':'#9fccff';g2.lineWidth=selIs('win',win.id)?8:6;g2.lineCap='butt';
    g2.beginPath();g2.moveTo(wx,wy);g2.lineTo(vx,vy);g2.stroke();
  }
  g2.lineCap='butt';
}
function drawTrack2d(t){
  const isSel=selIs('track',t.id);const a=t.rot*D2R;
  const[x1,y1]=w2s(t.x-Math.cos(a)*t.len/2,t.y-Math.sin(a)*t.len/2),[x2,y2]=w2s(t.x+Math.cos(a)*t.len/2,t.y+Math.sin(a)*t.len/2);
  g2.strokeStyle=isSel?'#fff':t.color;g2.lineWidth=isSel?5:3.5;g2.lineCap='round';
  g2.beginPath();g2.moveTo(x1,y1);g2.lineTo(x2,y2);g2.stroke();g2.lineCap='butt';
  g2.fillStyle=isSel?'#fff':t.color;g2.font='11px sans-serif';g2.fillText(`${t.name} ${t.len}м`,x1+6,y1-6);
}
function drawLightMark2d(L){
  const isSel=selIs('light',L.id);const[bx,by]=lightBase(L),[sx,sy]=w2s(bx,by);
  if((L.shape==='line'||L.shape==='rect')&&L.trackId==null){const a=L.rot*D2R;const[p1x,p1y]=w2s(L.x-Math.cos(a)*L.len/2,L.y-Math.sin(a)*L.len/2),[p2x,p2y]=w2s(L.x+Math.cos(a)*L.len/2,L.y+Math.sin(a)*L.len/2);g2.strokeStyle=L.color;g2.lineWidth=3;g2.globalAlpha=.5;g2.beginPath();g2.moveTo(p1x,p1y);g2.lineTo(p2x,p2y);g2.stroke();g2.globalAlpha=1;}
  if(L.shape==='chandelier'&&L.trackId==null){g2.strokeStyle=L.color;g2.globalAlpha=.4;g2.beginPath();g2.arc(sx,sy,(L.radius||0.4)*view.scale,0,TAU);g2.stroke();g2.globalAlpha=1;for(const[ex,ey]of emittersPlan(L)){const[mx,my]=w2s(ex,ey);g2.beginPath();g2.arc(mx,my,3,0,TAU);g2.fillStyle=L.color;g2.fill();}}
  const off=L.on===false;
  g2.beginPath();g2.arc(sx,sy,isSel?7:5,0,TAU);g2.fillStyle=off?'#555b66':L.color;g2.fill();g2.lineWidth=2;g2.strokeStyle=isSel?'#fff':'#0008';g2.stroke();
  if(L.tilt>0&&L.shape!=='sconce'&&!off){const az=L.az*D2R,ln=16+L.tilt*0.3;g2.beginPath();g2.moveTo(sx,sy);g2.lineTo(sx+Math.cos(az)*ln,sy+Math.sin(az)*ln);g2.strokeStyle=L.color;g2.lineWidth=2;g2.stroke();}
  g2.fillStyle=off?'#8a93a6':'#fff';g2.font='10px sans-serif';g2.fillText(L.name+(L.dir==='up'?' ↑':'')+(off?' ⏻':''),sx+8,sy-7);
}
function drawSun2d(){
  const bb=bbox();const[sx,sy]=w2s(S.sun.x,S.sun.y),[cx,cy]=w2s(bb.cx,bb.cy);const c=S.sun.on?'#ffe08a':'#7a7158';
  g2.strokeStyle=(S.sun.on?'#ffe08a':'#7a7158')+'55';g2.lineWidth=1.5;g2.setLineDash([5,5]);g2.beginPath();g2.moveTo(sx,sy);g2.lineTo(cx,cy);g2.stroke();g2.setLineDash([]);
  g2.beginPath();g2.arc(sx,sy,selIs('sun','sun')?9:7,0,TAU);g2.fillStyle=c;g2.fill();g2.strokeStyle=selIs('sun','sun')?'#fff':'#0008';g2.lineWidth=2;g2.stroke();
  g2.fillStyle=c;g2.font='10px sans-serif';g2.fillText('☀ '+(S.sun.on?'':'(off) ')+'h'+S.sun.height,sx+11,sy-8);

function selIs(k,id){return sel&&sel.kind===k&&sel.id===id;}

/* ---- 2D interaction ---- */
let drag=null,pan=null,space=false,drawMode=false,drawPrev=null,drawCur=null,shiftDown=false;
function hit2d(sx,sy){
  for(let i=S.lights.length-1;i>=0;i--){const L=S.lights[i];if(!vis(L))continue;const[bx,by]=lightBase(L);const[fx,fy]=w2s(bx,by);if(Math.hypot(fx-sx,fy-sy)<11)return{kind:'light',id:L.id};}
  {const[ux,uy]=w2s(S.sun.x,S.sun.y);if(Math.hypot(ux-sx,uy-sy)<12)return{kind:'sun',id:'sun'};}
  for(let i=S.tracks.length-1;i>=0;i--){const t=S.tracks[i];if(!vis(t))continue;const a=t.rot*D2R;const[p1,p2]=[w2s(t.x-Math.cos(a)*t.len/2,t.y-Math.sin(a)*t.len/2),w2s(t.x+Math.cos(a)*t.len/2,t.y+Math.sin(a)*t.len/2)];if(distSeg(sx,sy,p1[0],p1[1],p2[0],p2[1])<8)return{kind:'track',id:t.id};}
  for(let i=S.windows.length-1;i>=0;i--){const win=S.windows[i];if(!vis(win))continue;const w=getWall(win.wallId);if(!w)continue;const len=wallLen(w)||1,ux=(w.x2-w.x1)/len,uy=(w.y2-w.y1)/len;const c0=w.x1+ux*clamp(win.pos-win.width/2,0,len),c1=w.y1+uy*clamp(win.pos-win.width/2,0,len),d0=w.x1+ux*clamp(win.pos+win.width/2,0,len),d1=w.y1+uy*clamp(win.pos+win.width/2,0,len);const[a0,a1]=w2s(c0,c1),[b0,b1]=w2s(d0,d1);if(distSeg(sx,sy,a0,a1,b0,b1)<9)return{kind:'win',id:win.id};}
  for(let i=S.walls.length-1;i>=0;i--){const w=S.walls[i];if(!vis(w))continue;const[a0,a1]=w2s(w.x1,w.y1),[b0,b1]=w2s(w.x2,w.y2);
    if(Math.hypot(a0-sx,a1-sy)<9)return{kind:'wall',id:w.id,end:1};if(Math.hypot(b0-sx,b1-sy)<9)return{kind:'wall',id:w.id,end:2};
    if(distSeg(sx,sy,a0,a1,b0,b1)<7)return{kind:'wall',id:w.id};}
  for(let i=S.objs.length-1;i>=0;i--){const o=S.objs[i];if(!vis(o))continue;const[scx,scy]=w2s(o.x+o.w/2,o.y+o.d/2);const a=-(o.rot||0)*D2R,dx=sx-scx,dy=sy-scy;const lx=dx*Math.cos(a)-dy*Math.sin(a),ly=dx*Math.sin(a)+dy*Math.cos(a);if(Math.abs(lx)<=o.w*view.scale/2&&Math.abs(ly)<=o.d*view.scale/2)return{kind:'obj',id:o.id};}
  return null;
}
function distSeg(px,py,ax,ay,bx,by){const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;let t=l2?((px-ax)*dx+(py-ay)*dy)/l2:0;t=clamp(t,0,1);return Math.hypot(px-(ax+dx*t),py-(ay+dy*t));}
function snap2d(x,y){
  for(const w of S.walls)for(const[ex,ey]of[[w.x1,w.y1],[w.x2,w.y2]])if(Math.hypot(x-ex,y-ey)<0.25)return{x:ex,y:ey,node:true};
  if(shiftDown)return{x:round(x),y:round(y)};         // Shift — свободно (шаг 1 см)
  const s=0.1;return{x:round(Math.round(x/s)*s),y:round(Math.round(y/s)*s)};   // тонкая привязка 0.1 м
}
cv2.addEventListener('mousedown',e=>{
  const r=cv2.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top;
  if(e.button===2||space){pan={sx,sy,px:view.panx,py:view.pany};return;}
  if(drawMode)return; // обрабатываем на mouseup (клик)
  const h=hit2d(sx,sy);
  if(h){select(h.kind,h.id);const[wx,wy]=s2w(sx,sy);drag={...h,wx0:wx,wy0:wy,snap:JSON.parse(JSON.stringify(findModel(h.kind,h.id)))};}
  else select(null);
});
window.addEventListener('mousemove',e=>{
  if(mode!=='2d')return;const r=cv2.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top;
  if(drawMode){const[wx,wy]=s2w(sx,sy);drawCur=snap2d(wx,wy);draw2d();return;}
  if(pan){view.panx=pan.px-(sx-pan.sx)/view.scale;view.pany=pan.py-(sy-pan.sy)/view.scale;draw2d();return;}
  if(!drag)return;const[wx,wy]=s2w(sx,sy),dx=wx-drag.wx0,dy=wy-drag.wy0,m=findModel(drag.kind,drag.id);if(!m)return;
  if(drag.kind==='obj'){m.x=round(drag.snap.x+dx);m.y=round(drag.snap.y+dy);}
  else if(drag.kind==='track'){m.x=round(drag.snap.x+dx);m.y=round(drag.snap.y+dy);}
  else if(drag.kind==='sun'){m.x=round(drag.snap.x+dx);m.y=round(drag.snap.y+dy);}
  else if(drag.kind==='light'){if(m.shape==='sconce'){const nw=nearestWall(wx,wy);if(nw){m.wallId=nw.w.id;m.pos=round(clamp(nw.pos,0,nw.len));}}else if(m.trackId!=null){const t=getTrack(m.trackId),a=t.rot*D2R;m.u=clamp(round((wx-t.x)*Math.cos(a)+(wy-t.y)*Math.sin(a)),-t.len/2,t.len/2);}else{m.x=round(drag.snap.x+dx);m.y=round(drag.snap.y+dy);}}
  else if(drag.kind==='wall'){if(drag.end===1){m.x1=round(drag.snap.x1+dx);m.y1=round(drag.snap.y1+dy);}else if(drag.end===2){m.x2=round(drag.snap.x2+dx);m.y2=round(drag.snap.y2+dy);}else{m.x1=round(drag.snap.x1+dx);m.y1=round(drag.snap.y1+dy);m.x2=round(drag.snap.x2+dx);m.y2=round(drag.snap.y2+dy);}}
  else if(drag.kind==='win'){const nw=nearestWall(wx,wy);if(nw){m.wallId=nw.w.id;m.pos=round(clamp(nw.pos,0,nw.len));}}
  draw2d();fillEditor();renderCards();
});
window.addEventListener('mouseup',()=>{if((drag||pan)&&mode==='2d')persistSoon();drag=null;pan=null;});
cv2.addEventListener('contextmenu',e=>e.preventDefault());
cv2.addEventListener('click',e=>{
  if(!drawMode)return;const r=cv2.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top;const[wx,wy]=s2w(sx,sy),sp=snap2d(wx,wy);
  if(drawPrev&&(Math.abs(sp.x-drawPrev.x)>0.05||Math.abs(sp.y-drawPrev.y)>0.05))S.walls.push({id:nextId++,x1:drawPrev.x,y1:drawPrev.y,x2:sp.x,y2:sp.y});
  drawPrev=sp;sync(true);
});
cv2.addEventListener('dblclick',e=>{if(drawMode){endDraw();return;}const r=cv2.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top;const h=hit2d(sx,sy);if(h&&h.kind==='wall')delEntity('wall',h.id);});
cv2.addEventListener('wheel',e=>{e.preventDefault();const r=cv2.getBoundingClientRect(),sx=e.clientX-r.left,sy=e.clientY-r.top,[wx,wy]=s2w(sx,sy);const f=e.deltaY<0?1.12:1/1.12;view.scale=clamp(view.scale*f,8,300);view.panx=wx-sx/view.scale;view.pany=wy-sy/view.scale;draw2d();persistSoon();},{passive:false});
window.addEventListener('keydown',e=>{
  if(e.code==='Space')space=true;
  if(e.key==='Shift')shiftDown=true;
  if(e.key==='Escape'&&drawMode)endDraw();
  const tn=(e.target.tagName||'');
  if(!/^(INPUT|SELECT|TEXTAREA)$/.test(tn)){
    if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='c'){copySel();e.preventDefault();return;}
    if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='v'){pasteClip();e.preventDefault();return;}
    if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='d'){if(sel&&sel.kind!=='sun'){duplicateSel();e.preventDefault();}return;}
    if((e.key==='Delete'||e.key==='Backspace')&&sel&&sel.kind!=='sun')delEntity(sel.kind,sel.id);
  }
});
window.addEventListener('keyup',e=>{if(e.code==='Space')space=false;if(e.key==='Shift')shiftDown=false;});
function endDraw(){drawMode=false;drawPrev=null;drawCur=null;$('#drawWall').classList.remove('on');setHint();draw2d();}

/* ================= 3D ENGINE ================= */
const cv=$('#cv');
const renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});

const scene=new THREE.Scene();scene.background=new THREE.Color(0x0f1115);

const orbit=new OrbitControls(camera,cv);orbit.enableDamping=true;orbit.dampingFactor=0.08;

const V=(x,y,h)=>new THREE.Vector3(x,h,y);
let root=new THREE.Group();scene.add(root);
const groups=new Map();const selectables=[];let sunLight=null,sunMarker=null,sunGuide=null,fitted=false;
let curMax=4,curMS=1024,curBlur=12,shadowCount=0;   // текущий бюджет/качество теней
// max = число теневых источников. GPU-лимит MAX_TEXTURE_IMAGE_UNITS=16 → casters+солнце ≤16, иначе шейдер не линкуется. Держим потолок 13.
function qcfg(){return ({low:{sh:false,max:0,ms:512,blur:6,pr:1},med:{sh:true,max:8,ms:1024,blur:12,pr:1.5},high:{sh:true,max:13,ms:2048,blur:24,pr:2}})[ui.quality||'med'];}
const ray=new THREE.Raycaster(),ndc=new THREE.Vector2(),planeY0=new THREE.Plane(new THREE.Vector3(0,1,0),0);

function tag(g,kind,id){g.userData={kind,id};g.traverse(m=>{if(m.isMesh){m.userData.kind=kind;m.userData.id=id;selectables.push(m);}});}
function build3d(){clearErr();try{doBuild();}catch(e){showErr('3D: '+e.message);console.error(e);}}
function doBuild(){
  scene.remove(root);root.traverse(o=>{if(o.geometry)o.geometry.dispose();if(o.material){(Array.isArray(o.material)?o.material:[o.material]).forEach(m=>m.dispose());}});
  root=new THREE.Group();scene.add(root);groups.clear();selectables.length=0;sunLight=sunMarker=null;
  const bb=bbox(),ceil=S.room.ceil;

function pasteClip(){if(!clip)return;const m={...clip.data,id:nextId++,layer:S.activeLayer};

  else if(clip.kind==='win'){if(m.wallId!=null){const w=getWall(m.wallId);m.pos=clamp((m.pos||0)+0.3,0,w?wallLen(w):(m.pos||0)+0.3);}S.windows.push(m);}
  else if(clip.kind==='track'){m.x+=0.3;m.y+=0.3;S.tracks.push(m);}
  else if(clip.kind==='light'){if(m.trackId!=null)m.u=(m.u||0)+0.2;else{m.x+=0.3;m.y+=0.3;}S.lights.push(m);}
  else{m.x+=0.3;m.y+=0.3;S.objs.push(m);}
  sync(true);select(clip.kind,m.id);
}
function duplicateSel(){copySel();pasteClip();}
function distribute(t,m,p){const fx=S.lights.filter(L=>L.trackId===t.id),k=fx.length;if(!k)return;let us=[];if(m==='pitch'){const span=(k-1)*p;for(let i=0;i<k;i++)us.push(-span/2+i*p);}else{if(k===1)us=[0];else for(let i=0;i<k;i++)us.push((i/(k-1)-0.5)*t.len);}fx.forEach((L,i)=>L.u=clamp(us[i],-t.len/2,t.len/2));sync(false);fillEditor();}

const ICON={wall:'▬',win:'▢',track:'▭',light:'●',obj:'▪'};
function itemsOfLayer(id){
  const out=[];
  S.walls.forEach((w,i)=>{if(w.layer===id)out.push({k:'wall',e:w,label:`${t('card_wall')} ${i+1} · ${round(wallLen(w))}м`});});
  S.windows.forEach(w=>{if(w.layer===id)out.push({k:'win',e:w,label:`${w.name} · ${w.width}×${w.height}м`});});
  S.tracks.forEach(tr=>{if(tr.layer===id)out.push({k:'track',e:tr,label:`${tr.name} · ${tr.len}м`});});
  S.lights.forEach(l=>{if(l.layer===id){const tr=l.trackId!=null?getTrack(l.trackId):null;out.push({k:'light',e:l,label:`${l.name}${tr?' · '+t('card_spot')+' «'+tr.name+'»':''}`});}});
  S.objs.forEach(o=>{if(o.layer===id)out.push({k:'obj',e:o,label:`${o.name} · ${o.w}×${o.d}×${o.h}м`});});
  return out;
}
function renderLayers(){

    head.innerHTML=`<div class="top"><span class="x" data-collapse="1" style="font-size:11px;width:12px">${l.collapsed?'▸':'▾'}</span><span class="x" data-eye="1" style="font-size:13px">${l.visible?'👁':'🚫'}</span><span class="name" style="opacity:${l.visible?1:0.5}">${l.name}</span><span style="color:var(--muted);font-size:11px">${items.length}</span><span class="x" data-del="1">×</span></div>`;
    head.onclick=e=>{if(e.target.dataset.collapse){l.collapsed=!l.collapsed;renderLayers();persistSoon();return;}if(e.target.dataset.eye){l.visible=!l.visible;sync(true);return;}if(e.target.dataset.del){delLayer(l.id);return;}S.activeLayer=l.id;renderLayers();persistSoon();};
    box.appendChild(head);

}
function delLayer(id){if(S.layers.length<=1)return;const rest=S.layers.find(l=>l.id!==id).id;for(const e of allEntities())if(e.layer===id)e.layer=rest;S.layers=S.layers.filter(l=>l.id!==id);if(S.activeLayer===id)S.activeLayer=rest;sync(true);}

function H(t){const d=document.createElement('div');d.className='grp';d.style.margin='0 0 8px';d.innerHTML=`<label>${t}</label>`;return d;}
function F(l,type,val,on,step){const d=document.createElement('div');d.className='row';d.innerHTML=`<label>${l}</label>`;const i=document.createElement('input');i.type=type;if(step)i.step=step;i.value=val;i.oninput=()=>on(i.value);d.appendChild(i);return d;}
function FC(l,val,on){const d=document.createElement('div');d.className='row';d.innerHTML=`<label>${l}</label>`;const i=document.createElement('input');i.type='color';i.className='color';i.value=val;i.oninput=()=>on(i.value);d.appendChild(i);return d;}

function applyScene(d){
  S={room:d.room||{grid:0.5,ceil:2.7},walls:d.walls||[],windows:(d.windows||[]).map(normWin),tracks:d.tracks||[],lights:(d.lights||[]).map(normLight),objs:(d.objs||[]).map(o=>({rot:0,...o})),sun:{...demoScene().sun,...(d.sun||{})}};
  if(!S.walls.length&&d.room&&d.room.w){const W=d.room.w,Hh=d.room.h;S.walls=[{id:1001,x1:0,y1:0,x2:W,y2:0},{id:1002,x1:W,y1:0,x2:W,y2:Hh},{id:1003,x1:W,y1:Hh,x2:0,y2:Hh},{id:1004,x1:0,y1:Hh,x2:0,y2:0}];}
  if(!S.room.grid)S.room.grid=0.5;if(!S.room.ceil)S.room.ceil=2.7;
  nextId=d.nextId||Math.max(1,...[...S.walls,...S.windows,...S.tracks,...S.lights,...S.objs].map(x=>x.id||0))+1;
  S.layers=d.layers&&d.layers.length?d.layers:[{id:90,name:'Слой 1',visible:true}];
  S.activeLayer=d.activeLayer;
  normalizeLayers();normalizeSun();
  if(d._lang==='ru'||d._lang==='en')lang=d._lang;
  if(d._ui)Object.assign(ui,d._ui);
}
function loadData(d){applyScene(d);if(d._view)Object.assign(view,d._view);sel=null;tc.detach();fitted=false;clearErr();syncRoom();syncSun();syncViewUI();applyI18n();if(!d._view)fit2d();sync(true);}
function normLight(l){return{shape:'point',dir:'down',on:true,bulbs:5,radius:0.4,beam:30,field:50,tilt:0,az:0,len:1.2,wid:0.3,n:16,n2:4,rot:0,dmode:'count',pitch:100,trackId:null,u:0,wallId:null,power:60,mh:2.7,x:0,y:0,...l};}
function normWin(w){return{kind:'window',sill:0.9,height:1.4,width:1.6,pos:1,...w};}
function fit2d(){const bb=bbox(),W=cv2.clientWidth||800,Hh=cv2.clientHeight||600,pad=1.2;const s=Math.min(W/((bb.maxx-bb.minx)+2*pad),Hh/((bb.maxy-bb.miny)+2*pad));view.scale=clamp(s,8,300);view.panx=bb.minx-(W/view.scale-(bb.maxx-bb.minx))/2;view.pany=bb.miny-(Hh/view.scale-(bb.maxy-bb.miny))/2;}
function fit3d(){const bb=bbox();orbit.target.set(bb.cx,0.6,bb.cy);if(!fitted){const d=Math.max(bb.size||8,(S.sun&&S.sun.height||6)*1.6);camera.position.set(bb.cx+d*0.85,S.room.ceil+d*1.0,bb.cy+d*1.15);fitted=true;}orbit.update();}
$('#fit').onclick=()=>{if(mode==='2d'){fit2d();draw2d();}else{fitted=false;fit3d();}};
function updateInfo(){$('#info').textContent=t('info',S.walls.length,S.windows.length,S.lights.length,S.tracks.length,S.objs.length);}

/* ================= loop / resize ================= */
function resize(){const r=$('#stage').getBoundingClientRect();renderer.setPixelRatio(Math.min(qcfg().pr,window.devicePixelRatio||1));renderer.setSize(r.width,r.height,false);camera.aspect=r.width/r.height;camera.updateProjectionMatrix();resize2d();if(mode==='2d')draw2d();}
window.addEventListener('resize',resize);
function tick(){if(mode==='3d'){orbit.update();renderer.render(scene,camera);}requestAnimationFrame(tick);}

let bootMode='2d', restored=false;
try{const raw=localStorage.getItem('lightspot3');if(raw){const d=JSON.parse(raw);if(d&&d.room){applyScene(d);if(d._view){Object.assign(view,d._view);restored=true;}if(d._mode)bootMode=d._mode;}}}catch(e){}
normalizeLayers();normalizeSun();syncRoom();syncSun();syncViewUI();applyLayersOpen();resize();if(!restored)fit2d();applyI18n();renderCards();fillEditor();updateInfo();setMode(bootMode);tick();
</script>
</body>
</html>
